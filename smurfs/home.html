<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smurfs World</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body { 
  background: linear-gradient(120deg, #A7D8FF, #5DBBFF);
  font-family: cursive;
  line-height: 1.5;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:flex-end;
  padding:20px 40px;
}

nav ul{
  display:flex;
  gap:15px;
}

nav ul li{
  list-style:none;
}

nav ul li a{
  color:white;
  text-decoration:none;
  padding:10px 15px;
  border:2px solid white;
  border-radius:10px;
  transition:0.3s;
}

nav ul li a:hover{
  background:white;
  color:#1248ad;
  transform:scale(1.05);
}

/* HERO BANNER (UPDATED) */
.hero{
  height: 85vh;
  width: calc(100% - 40px);
  margin: 20px;
  background: url("images/The Smurfs.jpg") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;

  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* OVERLAY */
.overlay{
  background: rgba(0, 0, 0, 0.4);
  padding: 40px;
  text-align:center;
  border-radius: 20px;
}

/* TEXT */
.hero h1{
  color: white;
  font-size: 55px;
  margin-bottom: 15px;
}

.hero p{
  color: #ddd;
  font-size: 20px;
}

/* FOOTER */
footer{
  background:#003366;
  color:white;
  text-align:center;
  padding:25px;
}

footer a{
  color:#00ccff;
  margin:0 10px;
  text-decoration:none;
}

footer a:hover{
  text-decoration:underline;
}

footer .social a{
  color:#ccc;
}

/* MOBILE */
@media(max-width:768px){

  nav{
    justify-content:center;
  }

  .hero{
    height: 60vh;
    width: calc(100% - 20px);
    margin: 10px;
    border-radius: 20px;
  }

  .hero h1{
    font-size:28px;
  }

  .hero p{
    font-size:14px;
  }

  .overlay{
    padding:20px;
  }
}
</style>
</head>

<body>

<nav>
  <ul>
    <li><a href="home.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="characters.html">Characters</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="overlay">
    <h1 class="animate__animated animate__fadeInDown">
      Welcome to Smurf Village
    </h1>
    <p class="animate__animated animate__fadeInUp">
      Explore the magical world of the Smurfs
    </p>
  </div>
</section>

<footer>
  <h3>The Smurfs™</h3>
  <p>Explore the Smurf village, play games, watch videos, and have fun!</p>

  <div>
    <a href="characters.html">Characters</a>
    <a href="https://play.google.com/store/apps/details?id=com.capcom.smurfsandroid&hl=en_IN">Games</a>
    <a href="https://www.youtube.com/channel/UCeY4C8Sbx8B4bIyREPSvORQ?sub_confirmation=1">Videos</a>
    <a href="https://bluedwarfs.com/en/">Shop</a>
  </div>

  <div class="social" style="margin-top:10px;">
    <a href="https://www.facebook.com/SmurfOfficial/">Facebook</a> |
    <a href="https://www.instagram.com/smurfsofficial/?hl=en">Instagram</a> |
    <a href="https://x.com/SmurfsMovie">Twitter</a>
  </div>

  <p style="font-size:12px; color:#aaa; margin-top:10px;">
    &copy; 2025 Peyo - All rights reserved.
  </p>
</footer>

</body>
</html>
